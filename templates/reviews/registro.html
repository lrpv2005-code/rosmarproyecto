{% extends 'base.html' %}

{% block title %}Registro{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 2rem;">Crear Cuenta</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-brand" style="width: 100%; border: none; padding: 1rem; font-size: 1.1rem; cursor: pointer; margin-top: 1rem;">Registrarse</button>
        </form>
        <p style="margin-top: 2rem; color: #adb5bd;">¿Ya tienes cuenta? <a href="{% url 'login' %}" style="color: var(--primary);">Inicia Sesión</a></p>
    </div>
</div>
{% endblock %}
